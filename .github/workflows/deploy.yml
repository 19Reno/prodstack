name: ProdStack CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t prodstack-app:${{ github.sha }} ./app

      - name: Update image version in Terraform
        run: |
          sed -i "s|prodstack-app:.*\"|prodstack-app:${{ github.sha }}\"|" terraform/containers.tf

      - name: Terraform apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

      - name: Verify containers running
        run: |
          docker ps | grep tf-app
